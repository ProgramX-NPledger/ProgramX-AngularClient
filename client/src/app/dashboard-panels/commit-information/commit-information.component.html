
<div id="commitInformation" class="card bg-base-100 w-[98%] mx-auto p-10 mt-10 shadow-xl">
  <div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100">
    <h2 class="text-2xl font-bold">Commit information</h2>

    <table class="table w-full">
      <tbody>
        <tr>
          <th></th>
          <th>Web site</th>
          <th>API
          @if (isLoading()) {
            <span class="loading loading-spinner loading-xs"></span>
          }
          </th>
        </tr>
        <tr>
          <td>GitHub commit hash</td>
          <td>{{ environment.gitHubCommitHash }}</td>
          <td>{{ gitCommitHash }}</td>
        </tr>
        <tr>
          <td>Build number</td>
          <td>{{ environment.buildNumber }}</td>
          <td>{{ buildNumber }}</td>
        </tr>
        <tr>
          <td>Deployment date</td>
          <td>{{ environment.deployedAt }}</td>
          <td>{{ deployedAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
        </tr>
      </tbody>
    </table>


  </div>



</div>
